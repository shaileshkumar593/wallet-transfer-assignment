version: "3.8"

services:
  app:
    build: .
    container_name: wallet-app
    ports:
      - "8080:8080"

    # Persist SQLite DB
    volumes:
      - wallet_data:/app/data

    # Ensure DB file path matches Go code
    environment:
      DB_PATH: /app/data/wallet.db

    restart: unless-stopped

volumes:
  wallet_data: