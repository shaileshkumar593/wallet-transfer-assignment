services:

  postgres:

    image: postgres:17

    container_name: wallet-postgres

    environment:
      POSTGRES_DB: wallet
      POSTGRES_USER: wallet
      POSTGRES_PASSWORD: wallet

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:

    build: .

    container_name: wallet-service

    depends_on:
      - postgres

    environment:

      SERVER_PORT: 8080

      DB_HOST: postgres
      DB_PORT: 5432

      DB_USER: wallet
      DB_PASSWORD: wallet
      DB_NAME: wallet

    ports:
      - "8080:8080"

volumes:
  postgres_data: